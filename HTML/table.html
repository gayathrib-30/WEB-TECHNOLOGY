<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Tag</title>
</head>
<body>
    <h1>TABLE TAG IN HTML</h1>
    <table border="1" width="600" height="400" cellspacing="10" cellpadding="50">
        <caption>Employee Table</caption>
        <tr>
            <th>Ename</th>
            <th>Salary</th>
            <th>Eid</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Miller</td>
            <td>4000</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Scott</td>
            <td>5000</td>
        </tr> 
        <tr>
            <td>3</td>
            <td>Smith</td>
            <td>9000</td>
        </tr>        
    </table>
</body>
</html>
