<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Task</title>
</head>
<body>
    <table border="1" width="700" height="300" cellspacing="5" cellpadding="20">
        <caption>Cartoon Characters</caption>
        <tr>
            <th>Character Image</th>
            <th>Character Name</th>
            <th>Known For</th>
        </tr>
        <tr>
            <td>
                <img src="https://i.pinimg.com/originals/59/30/74/593074c302700c41ae6fdfeca3d51563.gif" alt="Doraemon gif" >
            </td>
            <td>Doraemon</td>
            <td>
                <ul>
                    <li>Dependable</li>
                    <li>Fear of Mise</li>
                    <li>Dorayaki obsessed</li>
                </ul>
            </td>
        </tr>
        <tr>
            <td>
                <img src="https://www.gifss.com/dibujos-animados/doraemon/images/gif-nobita.gif" alt="Nobita gif" height="200" width="200">
            </td>
            <td>Nobita</td>
            <td>
                <ul type="circle">
                    <li>Lazy</li>
                    <li>Reliable on gadgets</li>
                    <li>Unathletic</li>
                </ul>
            </td>
        </tr>
        <tr>
            <td>
                <img src="https://media.tenor.com/W_Kh-v6kiwIAAAAM/doraemon-shizuka.gif" alt="Shizuka gif">
            </td>
            <td>Shizuka</td>
            <td>
                <ol>
                    <li>Kind</li>
                    <li>Studious</li>
                    <li>Bakes Cookies</li>
                </ol>
            </td>
        </tr>
    </table>
</body>
</html>
