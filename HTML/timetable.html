<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable</title>
</head>
<body>
    <table border="2" width="900" height="500" cellspacing="5" cellpadding="5">
        <caption>College Timetable</caption>
        <tr>
            <th>Day/Period</th>
            <th>9:30-10:20</th>
            <th>10:20-11:10</th>
            <th>11:10-12:00</th>
            <th>12:00-12:45</th>
            <th>12:45-1:30</th>
            <th>1:30-2:15</th>
            <th>2:15-3:00</th>
            <th>3:00-3:45</th>
        </tr>
        <tr>
            <th>Monday</th>
            <td>eng</td>
            <td>math</td>
            <td>chem</td>
            <td rowspan="5">lunch</td>
            <td colspan="3">lab</td>
            <td>phy</td>
        </tr>
        <tr>
            <th>Tuesday</th>
            <td colspan="3">lab</td>
            <td>eng</td>
            <td>tam</td>
            <td>mat</td>
            <td>bio</td>
        </tr>
        <tr>
            <th>Wednesday</th>
            <td>mat</td>
            <td>che</td>
            <td>eng</td>
            <td>bio</td>
            <td colspan="3">library</td>
        </tr>
        <tr>
            <th>Thursday</th>
            <td>phy</td>
            <td>tam</td>
            <td>mat</td>
            <td colspan="3">lab</td>
            <td>bio</td>
        </tr>
        <tr>
            <th>Friday</th>
            <td>eng</td>
            <td>mat</td>
            <td>chem</td>
            <td colspan="3">library</td>
            <td>phy</td>
        </tr>
    </table>
</body>
</html>
