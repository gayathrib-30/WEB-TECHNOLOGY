<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIV TAG</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        #nav{
            background-color:lightskyblue;
            display: flex;
            height: 80px;
            justify-content: space-around;
            align-items: center;
        }
        ul{
            display: flex;
            gap: 20px;
        }
        li{
            list-style: none;
            font-size: 18px;
            text-transform: capitalize;
            cursor: pointer;
            letter-spacing: 2px;
            font-weight: bold;
        }
        #main{
            height: 250px;
            background-color: lightcoral;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 10px;
            color: white;
        }
        #section{
            height: calc(100vh - 330px);
            background-color: lightslategray;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .card{
            height: 200px;
            width: 300px;
            background-color: white;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            box-shadow: 0px 4px 5px grey;
        }
    </style>
</head>
<body>
    <div id="nav">
        <h2>My LOGO</h2>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </div>
    <div id="main">
        <h1>Welcome to My Application</h1>
        <p>Here you will get 20% discount</p>
        <button>SHOP NOW</button>
    </div>
    <div id="section">
        <div class="card">
            <h3>I am Card-1</h3>
        </div>
         <div class="card">
            <h3>I am Card-2</h3>
        </div>
         <div class="card">
            <h3>I am Card-3</h3>
        </div>
        
    </div>
</body>
</html>
