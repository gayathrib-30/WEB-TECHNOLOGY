<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marquee Tag</title>
    <style>
        marquee{
            border:3px solid green ;
        }
    </style>
</head>
<body>
    <h1>MARQUEE TAG</h1>
    <marquee behavior="" direction="" scrollamount="50">
        <h2>Breaking News:RCB is qualified to Finale😡😡</h2>   
        <img src="https://img1.picmix.com/output/stamp/normal/5/2/4/4/2334425_073bf.gif" alt="" height="250">
        <img src="https://media3.giphy.com/media/v1.Y2lkPTZjMDliOTUyd2c5MjI3dGN0NzczM3ZjZHNtZnZxd3JhZm50cjA1aGlyeWYydWtxcyZlcD12MV9zdGlja2Vyc19zZWFyY2gmY3Q9cw/fstV57yumJ3dMUaYPr/200.gif" alt="" height="250">
    </marquee>
    <marquee behavior="" direction="right" scrollamount="20">
         <img src="https://cdn.pixabay.com/animation/2024/10/31/17/30/17-30-34-849_512.gif" alt="" height="250">
    </marquee>
    <marquee behavior="alternate" direction="right" scrollamount="20" loop="6" width="400">
        <h2>Good afternoon</h2>
        <!-- Here it will take only half length becoz i have given the width -->
    </marquee>
    <marquee behavior="" direction="up" height="400">
        <img src="https://i.pinimg.com/originals/9c/e0/4c/9ce04c7ddeef0b9abae7f085255cdef1.gif" alt="" height="150">
    </marquee>
</body>
</html>
