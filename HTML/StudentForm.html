<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Form</title>
</head>
<body>
    <h1>Student Form</h1>
    <form action="">
        <fieldset>
            <legend>Student Form</legend>

            <label for="sname">Student Name</label>
            <input type="text" placeholder="Enter your name" id="sname" name="stuName" required>
            <br><br>
            <label for="phone">Phone Number</label>
            <input type="tel" placeholder="Enter your phone number" id="phone" name="stuPhone" maxlength="10" readonly>
            <br><br>
            <label for="pwd">Password</label>
            <input type="password" placeholder="Enter your Password" id="pwd" name="stuPass" minlength="5">
            <br><br>
            <label for="age">Age</label>
            <input type="number" name="stuAge" id="age" placeholder="Enter your age">
            <br><br>
            <label for="mail">Email</label>
            <input type="email" name="stuEmail" id="mail" placeholder="Enter your Mail ID" value="student@gmail.com">
            <br><br>
            <label for="">Subjects</label>
            <br><br>
            <label for="sub1">HTML</label>
            <input type="checkbox" name="subject1" id="sub1" value="html">
            <label for="sub2">CSS</label>
            <input type="checkbox" name="subject2" id="sub2" value="css">
            <label for="sub3">JavaScript</label>
            <input type="checkbox" name="subject3" id="sub3" value="javascript">
            <br><br>
            <label for="">Select Gender</label>
            <br><br>
            <label for="male">Male</label>
            <input type="radio" name="gender" id="male" value="male">
            <label for="female">Female</label>
            <input type="radio" name="gender" id="female" value="female">
            <label for="others">Others</label>
            <input type="radio" name="gender" id="others" value="others">
            <br><br>
            <label for="address">Address</label>
            <br><br>
            <textarea name="address" id="address" rows="15" cols="30" placeholder="enter your address"></textarea>
            <br><br>
            <label for="">Select any one course</label>
            <select name="course" id="">
                <!-- we can use selected attribute in <option></option> -->
                <option value=""></option>
                <option value="java">Java Full Stack</option>
                <option value="python">Pyhton Full Stack</option>
                <option value="mern">MERN Stack</option>
            </select>
            <br><br>
            <label for="dob">Enter your DOB</label>
            <input type="date" name="dob" id="dob">
            <br><br>
            <!-- <button>Submit</button> -->
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
            <button disabled="disabled">Disable</button>
        </fieldset>
    </form>
</body>
</html>
